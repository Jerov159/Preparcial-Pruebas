name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Pytest + cobertura
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Instalar Python 3.12 con uv
        run: uv python install 3.12

      - name: Sincronizar dependencias (incluyendo grupo dev)
        run: uv sync --all-groups

      - name: Ejecutar pytest (unit + BDD) con cobertura
        run: >-
          uv run pytest
          --cov=src/notas
          --cov-branch
          --cov-report=term-missing
          --cov-report=xml
          --cov-fail-under=80

      - name: Publicar reporte de cobertura como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14
